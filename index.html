<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Mother's Day</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff5f5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      color: #ff4d6d;
    }

    p {
      font-size: 1.5rem;
      margin-top: 10px;
    }

    .letter {
      margin-top: 40px;
      width: 250px;
      height: 150px;
      background: #fff;
      border: 2px solid #ff4d6d;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .letter:hover {
      transform: scale(1.05);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    .open-text {
      font-size: 1.2rem;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Happy Mother's Day ❤️</h1>
  <p>आमा, तपाईं मेरो संसारको सबैभन्दा सुन्दर उपहार हुनुहुन्छ । तपाईंको माया र त्यागले मेरो जीवन उज्यालो बनाएको छ ❤️</p>

  <div class="letter" onclick="openLetter()">
    <span class="open-text">Open Letter 💌</span>
  </div>

  <div id="poem" class="hidden">
    <h2>My Dear Mom 💖</h2>
    <p>(Your poem will appear here)</p>
  </div>

  <script>
    function openLetter() {
      document.getElementById('poem').style.display = 'block';
    }
  </script>

</body>
</html>
